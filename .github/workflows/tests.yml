name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: py${{ matrix.python-version }} / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        # python -m pip, not bare pip: it guarantees the install lands in the
        # same interpreter that runs the tests. Every dependency here ships
        # wheels for all three platforms, so conda buys nothing and only adds
        # a solver that can fail.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[all]"
          python -m pip install pytest pyflakes

      - name: Verify the package imports
        # A separate step on purpose. When the install silently puts the
        # package somewhere the tests cannot see, the failure otherwise
        # surfaces later as a bare ModuleNotFoundError from pytest, which
        # says nothing about where it went wrong.
        run: python -c "import pyhrg; print(pyhrg.__name__, pyhrg.__version__, pyhrg.__file__)"

      - name: Lint
        run: python -m pyflakes pyhrg/

      - name: Test
        run: python -m pytest -v
