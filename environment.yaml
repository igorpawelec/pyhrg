# conda env create -f environment.yaml && conda activate pyhrg
# then: pip install --no-deps -e .
name: pyhrg
channels:
  - conda-forge
dependencies:
  - python>=3.9
  - numpy>=1.21
  - numba>=0.56
  - scipy>=1.7
  - scikit-image>=0.19
  # only needed to read/write files; the array API works without them
  - rasterio>=1.3
  - fiona>=1.9
  # development
  - pytest>=7.0
  - affine
  - pip
